services:
  adhed-api:
    build: .
    ports:
      - "${API_PORT:-8100}:${API_PORT:-8100}"
    environment:
      - DATABASE_URL=postgresql+asyncpg://adhed:adhed@adhed-db:5432/adhed
      - DATABASE_URL_SYNC=postgresql://adhed:adhed@adhed-db:5432/adhed
      - API_PORT=${API_PORT:-8100}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      adhed-db:
        condition: service_healthy
    restart: unless-stopped

  adhed-db:
    image: postgres:16
    volumes:
      - adhed-pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=adhed
      - POSTGRES_PASSWORD=adhed
      - POSTGRES_DB=adhed
    ports:
      - "${DB_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "adhed"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  adhed-pgdata:
