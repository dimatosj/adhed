services:
  taskstore-api:
    build: .
    ports:
      - "${API_PORT:-8100}:${API_PORT:-8100}"
    environment:
      - DATABASE_URL=postgresql+asyncpg://taskstore:taskstore@taskstore-db:5432/taskstore
      - DATABASE_URL_SYNC=postgresql://taskstore:taskstore@taskstore-db:5432/taskstore
      - API_PORT=${API_PORT:-8100}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      taskstore-db:
        condition: service_healthy
    restart: unless-stopped

  taskstore-db:
    image: postgres:16
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=taskstore
      - POSTGRES_PASSWORD=taskstore
      - POSTGRES_DB=taskstore
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "taskstore"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
